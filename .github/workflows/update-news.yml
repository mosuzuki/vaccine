name: Update dashboard and deploy Pages

on:
  workflow_dispatch:
  schedule:
    - cron: '10 21 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests deep-translator rapidfuzz

      - name: Fetch and build data
        run: python scripts/fetch_news.py

      - name: Commit updated data files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/news.json data/translation_cache.json || true
          git diff --cached --quiet || git commit -m "Update dashboard data"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
