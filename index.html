<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vaccine and Immunization Monitoring</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <header class="hero"><div class="wrap">
    <h1 id="site-title">Vaccine and Immunization Monitoring</h1>
    <p id="site-desc">過去14日間の信頼できる一次ソースに基づき、ワクチンの研究開発、予防接種政策、ワクチンコミュニケーションに関する最新情報をモニタリングするダッシュボード。</p>
    <div class="meta"><span id="generated-at"></span><span id="item-count"></span></div>
  </div></header>
  <main class="wrap layout">
    <section class="panel filters">
      <h2>フィルター</h2>
      <label>検索<input id="search" type="text" placeholder="タイトル・要点・情報源で検索"></label>
      <label>分類<select id="topic-filter"><option value="">すべて</option><option value="policy">政策</option><option value="research">研究開発</option><option value="communication">コミュニケーション</option></select></label>
      <label>政策タグ<select id="policy-filter"><option value="">すべて</option><option value="recommendation">勧告</option><option value="schedule">接種スケジュール</option><option value="approval">承認・適応</option><option value="financing">財政・調達</option><option value="safety">安全性</option><option value="outbreak_response">流行対応</option><option value="communication">コミュニケーション</option></select></label>
      <label>ワクチン<select id="vaccine-filter"><option value="">すべて</option><option value="covid">COVID-19</option><option value="influenza">インフルエンザ</option><option value="rsv">RSV</option><option value="measles">麻疹</option><option value="polio">ポリオ</option><option value="hpv">HPV</option><option value="pneumococcal">肺炎球菌</option><option value="pertussis">百日咳</option><option value="dengue">デング</option><option value="mpox">mpox</option><option value="cholera">コレラ</option><option value="ebola">エボラ</option></select></label>
      <label>地図表示<select id="plot-mode"><option value="source">発信元で表示</option><option value="target">対象国で表示</option></select></label>
    </section>
    <section class="panel map-panel"><div class="panel-head"><h2>地図</h2><div class="small">既定は発信元で表示。切り替えると対象国で表示します。</div></div><div id="map"></div></section>
    <section class="panel list-panel"><div class="panel-head"><h2>最新記事</h2><div id="visible-count" class="small"></div></div><div id="cards"></div></section>
    <section class="panel feed-panel"><div class="small">Feed Status</div><div id="feed-status"></div></section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
