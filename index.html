<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vaccine & Immunization Policy Monitor</title>
  <meta name="description" content="世界各国のワクチン・予防接種政策ニュースを日本語で監視するダッシュボード" />
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Vaccine & Immunization Policy Monitor</h1>
      <p class="subtitle">Daily report と同系統の一次情報・高信頼メディアを用いた、世界のワクチン／予防接種政策モニタリング</p>
    </div>
    <div class="header-actions">
      <span id="lastUpdatedBadge" class="badge">Loading…</span>
      <a class="ghost-btn" href="data/news.json" target="_blank" rel="noopener">JSON</a>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>検索・絞り込み</h2>
        <div class="field">
          <label for="searchInput">キーワード</label>
          <input id="searchInput" type="search" placeholder="日本語でも英語でも検索可" />
        </div>
        <div class="field-grid">
          <div class="field">
            <label for="regionFilter">対象地域</label>
            <select id="regionFilter"></select>
          </div>
          <div class="field">
            <label for="countryFilter">対象国</label>
            <select id="countryFilter"></select>
          </div>
        </div>
        <div class="field-grid">
          <div class="field">
            <label for="policyFilter">政策分類</label>
            <select id="policyFilter"></select>
          </div>
          <div class="field">
            <label for="sourceTypeFilter">情報源</label>
            <select id="sourceTypeFilter"></select>
          </div>
        </div>
        <div class="field-grid">
          <div class="field">
            <label for="daysFilter">期間</label>
            <select id="daysFilter">
              <option value="7">直近7日</option>
              <option value="14" selected>直近14日</option>
              <option value="30">直近30日</option>
              <option value="90">直近90日</option>
              <option value="3650">全期間</option>
            </select>
          </div>
          <div class="field">
            <label for="plotMode">地図表示</label>
            <select id="plotMode">
              <option value="topic" selected>ニュース対象国を優先</option>
              <option value="source">発信元所在地</option>
            </select>
          </div>
        </div>
        <div class="checkbox-row">
          <label><input id="officialOnly" type="checkbox" /> 一次情報のみ</label>
        </div>
        <div class="checkbox-row">
          <label><input id="asiaOnly" type="checkbox" /> アジア関連のみ</label>
        </div>
        <div class="button-row">
          <button id="resetBtn" class="primary-btn">Reset</button>
        </div>
      </section>

      <section class="panel">
        <h2>Summary</h2>
        <div id="summaryStats" class="stats-grid"></div>
      </section>

      <section class="panel">
        <h2>Feed status</h2>
        <div id="feedStatus"></div>
      </section>
    </aside>

    <section class="content">
      <section class="panel">
        <div class="section-head">
          <h2>Map</h2>
          <span id="resultCount" class="muted"></span>
        </div>
        <div id="map"></div>
        <div class="map-note">地図は既定で「ニュース対象国」を優先し、国を特定できない場合は情報発信元の所在地を表示します。</div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>News</h2>
          <div id="activeFilters" class="chip-row"></div>
        </div>
        <div id="newsList" class="news-list"></div>
      </section>
    </section>
  </main>

  <template id="newsCardTemplate">
    <article class="news-card">
      <div class="news-card-top">
        <div class="news-meta-left">
          <span class="tag tag-policy"></span>
          <span class="tag tag-source-type"></span>
          <span class="tag tag-region"></span>
        </div>
        <div class="news-date"></div>
      </div>
      <h3 class="news-title"><a target="_blank" rel="noopener"></a></h3>
      <div class="news-source-line"></div>
      <p class="news-summary"></p>
      <details class="original-block">
        <summary>Original</summary>
        <div class="news-original-title"></div>
        <div class="news-original-summary"></div>
      </details>
      <div class="news-footer"></div>
    </article>
  </template>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="assets/app.js"></script>
</body>
</html>
