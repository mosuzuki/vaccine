<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Global Vaccine Policy Monitor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="wrap">
    <h1 id="title">Global Vaccine Policy Monitor</h1>
    <p id="description"></p>
    <div class="meta"><span id="generatedAt"></span><span id="itemCount"></span></div>
  </header>

  <section class="wrap controls">
    <label>地図表示
      <select id="mapMode">
        <option value="source">発信元所在地</option>
        <option value="target">ニュース対象国</option>
      </select>
    </label>
    <label>ソース層
      <select id="tierFilter">
        <option value="all">すべて</option>
        <option value="1">Tier 1</option>
        <option value="2">Tier 2</option>
        <option value="3">Tier 3</option>
      </select>
    </label>
    <label>政策分類
      <select id="policyFilter"><option value="all">すべて</option></select>
    </label>
    <label>キーワード
      <input id="searchInput" type="search" placeholder="国名、ワクチン、勧告などで検索">
    </label>
  </section>

  <section class="wrap">
    <div id="map"></div>
  </section>

  <section class="wrap two-col">
    <div>
      <h2>記事一覧</h2>
      <div id="cards"></div>
    </div>
    <aside>
      <h2>取得状況</h2>
      <div id="feedStatus"></div>
    </aside>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="assets/app.js"></script>
</body>
</html>
