<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ワクチン・予防接種ダッシュボード（試行版）</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <header class="hero">
    <div class="wrap hero-inner">
      <div>
        <p class="eyebrow">Vaccine and Immunization Monitoring</p>
        <h1 id="site-title">ワクチン・予防接種ダッシュボード（試行版）</h1>
        <p id="site-desc">ワクチンの研究開発、予防接種政策、ワクチンコミュニケーションに関する最新情報をモニタリングするダッシュボード。</p>
      </div>
      <div class="hero-meta" aria-label="更新情報">
        <span id="generated-at"></span>
        <span id="item-count"></span>
        <span id="archive-count"></span>
      </div>
    </div>
  </header>

  <main class="wrap main">
    <section class="panel controls" aria-label="表示条件">
      <div>
        <h2>表示条件</h2>
        <p class="small">国内・海外別に、政策関連ニュースと学術論文を自動抽出します。</p>
      </div>
      <label>検索
        <input id="search" type="text" placeholder="タイトル・要点・情報源で検索">
      </label>
      <label>期間
        <select id="period-filter">
          <option value="14">過去14日</option>
          <option value="30">過去30日</option>
          <option value="90">過去90日</option>
          <option value="all">全期間</option>
        </select>
      </label>
      <label>ワクチン
        <select id="vaccine-filter">
          <option value="">すべて</option>
          <option value="covid">COVID-19</option>
          <option value="influenza">インフルエンザ</option>
          <option value="rsv">RSV</option>
          <option value="measles">麻疹</option>
          <option value="polio">ポリオ</option>
          <option value="hpv">HPV</option>
          <option value="pneumococcal">肺炎球菌</option>
          <option value="pertussis">百日咳</option>
          <option value="dengue">デング</option>
          <option value="mpox">mpox</option>
          <option value="cholera">コレラ</option>
          <option value="ebola">エボラ</option>
          <option value="rotavirus">ロタウイルス</option>
          <option value="meningococcal">髄膜炎菌</option>
          <option value="hepatitis">肝炎</option>
          <option value="malaria">マラリア</option>
        </select>
      </label>
    </section>

    <section class="dashboard-grid" aria-label="国内・海外別ピックアップ">
      <div class="region-column domestic-column">
        <div class="region-title">
          <div>
            <p class="eyebrow">Japan</p>
            <h2>国内</h2>
          </div>
          <span id="domestic-count" class="count-pill"></span>
        </div>
        <section class="panel pickup-panel">
          <div class="panel-head">
            <div>
              <h3>予防接種政策関係ニュース</h3>
              <p class="small">制度、勧告、接種スケジュール、承認、安全性、コミュニケーションなど</p>
            </div>
            <span id="domestic-policy-count" class="small"></span>
          </div>
          <div id="domestic-policy" class="cards compact-cards"></div>
        </section>
        <section class="panel pickup-panel">
          <div class="panel-head">
            <div>
              <h3>学術論文ピックアップ</h3>
              <p class="small">研究論文、学術誌、プレプリント、エビデンス評価</p>
            </div>
            <span id="domestic-research-count" class="small"></span>
          </div>
          <div id="domestic-research" class="cards compact-cards"></div>
        </section>
      </div>

      <div class="region-column international-column">
        <div class="region-title">
          <div>
            <p class="eyebrow">Global</p>
            <h2>海外</h2>
          </div>
          <span id="international-count" class="count-pill"></span>
        </div>
        <section class="panel pickup-panel">
          <div class="panel-head">
            <div>
              <h3>予防接種政策関係ニュース</h3>
              <p class="small">WHO、各国当局、規制機関、国際機関等の政策関連情報</p>
            </div>
            <span id="international-policy-count" class="small"></span>
          </div>
          <div id="international-policy" class="cards compact-cards"></div>
        </section>
        <section class="panel pickup-panel">
          <div class="panel-head">
            <div>
              <h3>学術論文ピックアップ</h3>
              <p class="small">主要学術誌・専門誌・プレプリントからの研究情報</p>
            </div>
            <span id="international-research-count" class="small"></span>
          </div>
          <div id="international-research" class="cards compact-cards"></div>
        </section>
      </div>
    </section>

    <section class="panel feed-panel">
      <button id="feed-toggle" class="feed-toggle" type="button" aria-expanded="false">Feed Statusを表示</button>
      <div id="feed-status" class="feed-status hidden"></div>
    </section>
  </main>

  <script src="./assets/app.js"></script>
</body>
</html>
